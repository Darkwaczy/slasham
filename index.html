<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Slasham — Save More, Live Better | Best Deals in Nigeria</title>
  <meta name="description" content="Slasham is Nigeria's premier marketplace for exclusive deals. Save up to 70% on food, beauty, wellness, and experiences in Lagos, Abuja, and beyond. Curated premium deals for a better life." />
  <meta name="keywords" content="deals, coupons, discounts, Nigeria, Lagos, Abuja, shopping, food deals, spa coupons, Slasham" />
  <meta name="author" content="Slasham Marketplace" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://slasham.com" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://slasham.com/" />
  <meta property="og:title" content="Slasham — Save More, Live Better | Exclusive Deals" />
  <meta property="og:description" content="Discover exclusive deals and coupons from top businesses in Nigeria. Save big on food, beauty, experiences and more." />
  <meta property="og:image" content="https://slasham.com/assets/slashamlogo.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://slasham.com/" />
  <meta property="twitter:title" content="Slasham — Save More, Live Better | Exclusive Deals" />
  <meta property="twitter:description" content="Discover exclusive deals and coupons from top businesses in Nigeria. Save big on food, beauty, experiences and more." />
  <meta property="twitter:image" content="https://slasham.com/assets/slashamlogo.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="apple-touch-icon" href="/assets/favicon-removebg-preview.png" />
  <link rel="manifest" href="/manifest.json" />

  <!-- JSON-LD Structured Data for Google/AI -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Slasham",
      "url": "https://slasham.com",
      "logo": "https://slasham.com/assets/slashamlogo.png",
      "description": "Slasham is Nigeria's premier marketplace for exclusive deals and premium coupons.",
      "sameAs": [
        "https://twitter.com/slasham",
        "https://instagram.com/slasham",
        "https://facebook.com/slasham"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@slasham.com",
        "contactType": "customer service"
      }
    }
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Slasham",
      "url": "https://slasham.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://slasham.com/deals?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

</body>

</html>
